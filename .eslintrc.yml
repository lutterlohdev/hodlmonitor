env:
  browser: true
  es2021: true
extends:
  - google
  - plugin:svelte/base
parserOptions:
  ecmaVersion: 12
  sourceType: module
overrides: [
  {
    files: ['*.svelte'],
    parser: 'svelte-eslint-parser'
  }
]
rules: {
  quotes: ['error', 'double'],
  max-len: 0,
  require-jsdoc: 0,
  arrow-parens: 0,
  object-curly-spacing: 0
}